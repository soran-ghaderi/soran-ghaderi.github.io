name: CI - Build and Test

on:
  pull_request:
    branches:
      - main
      - master

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true  # Caches gems for faster builds

      # Mirror the deploy build exactly so a green PR predicts a clean deploy.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      # Blocking gate: broken internal links/anchors or any failed build
      # invariant fails the PR.
      - name: Validate links & build invariants
        run: bundle exec rake proof smoke
